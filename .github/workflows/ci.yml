name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Lua compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.4
          if [ -x /usr/bin/luac5.4 ] && [ ! -e /usr/local/bin/luac ]; then
            sudo ln -s /usr/bin/luac5.4 /usr/local/bin/luac
          fi

      - name: Install test dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Lua syntax check
        run: luac -p src/scripts/SensorList/main.lua

      - name: Run docs tests
        run: python -m pytest tests/test_docs_commands.py tests/test_docs_contracts.py -q

      - name: Run test suite
        run: python -m pytest -q
