name: Codex review fallback

on:
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to review
        required: true
        type: number

permissions:
  contents: read

jobs:
  codex:
    name: Review pull request
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        (
          github.event.issue.pull_request &&
          github.event.comment.body == '@codex review'
        )
      }}
    runs-on: ubuntu-latest
    outputs:
      final_message: ${{ steps.run_codex.outputs.final-message }}
      pr_number: ${{ steps.pr.outputs.pr_number }}
    steps:
      - name: Resolve pull request context
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.eventName === 'workflow_dispatch'
              ? Number(core.getInput('pr_number'))
              : context.payload.issue.number;
            const { data: pull } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });
            core.setOutput('pr_number', String(prNumber));
            core.setOutput('base_ref', pull.base.ref);
      - name: Checkout pull request merge
        uses: actions/checkout@v5
        with:
          ref: refs/pull/${{ steps.pr.outputs.pr_number }}/merge
          persist-credentials: false
      - name: Pre-fetch base and head refs
        run: |
          git fetch --no-tags origin \
            "${{ steps.pr.outputs.base_ref }}" \
            "+refs/pull/${{ steps.pr.outputs.pr_number }}/head"
      - name: Run Codex review
        id: run_codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .github/codex/prompts/review.md
          sandbox: read-only
          output-file: codex-output.md

  post_feedback:
    name: Post Codex feedback
    needs: codex
    if: ${{ needs.codex.outputs.final_message != '' }}
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Post review fallback result
        uses: actions/github-script@v7
        env:
          CODEX_FINAL_MESSAGE: ${{ needs.codex.outputs.final_message }}
          PR_NUMBER: ${{ needs.codex.outputs.pr_number }}
        with:
          github-token: ${{ github.token }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(process.env.PR_NUMBER),
              body: `### Codex review fallback\n\n${process.env.CODEX_FINAL_MESSAGE}`,
            });
